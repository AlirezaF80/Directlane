# Karing enables Control and Sync (external controller) automatically.
# Default port is usually 3057 — see Settings → Port → Control and Sync.
# proxy-learner auto-reads %APPDATA%\karing\karing\service.json for port + secret.

rule-providers:
  learned-direct:
    type: file
    behavior: classical
    path: ./learned-direct.yaml
    interval: 86400

rules:
  - RULE-SET,learned-direct,DIRECT
  # ... your existing rules ...
  - MATCH,PROXY
